<!DOCTYPE html>
<html>
<body>
    <h1>Product Catalog</h1>

    <form method="GET">
        <input type="text" name="search" placeholder="Search products..." value="{{ request.GET.search }}">
        
        <select name="category">
            <option value="">All Categories</option>
            {% for cat in categories %}
            <!--Reference: https://stackoverflow.com/questions/4831306/need-to-convert-a-string-to-int-in-a-django-template-->
                <option value="{{ cat.id }}" {% if cat.id == request.GET.category|add:"0" %}selected{% endif %}>
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>
        
        <label for="tags">Filter by Tags:</label>
        <div>
            <strong>Filter by Tags:</strong>
            {% for tag in tags %}
                <label>
                    <input type="checkbox" name="tag" value="{{ tag.id }}" 
                        {% if tag.id|stringformat:"i" in selected_tags %}checked{% endif %}>
                    {{ tag.name }}
                </label>
            {% endfor %}
        </div>
        <button type="submit">Filter</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product.category.name }}</td>
                <td>${{ product.price }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No products found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
