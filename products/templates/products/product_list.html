<!DOCTYPE html>
<html>
<body>
    <h1>Product Catalog</h1>

    <form method="GET">
        <input type="text" name="search" placeholder="Search products..." value="{{ request.GET.search }}">
        
        <select name="category">
            <option value="">All Categories</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}" value="">
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>
        
        <label for="tags">Filter by Tags:</label>
        <select name="tag" multiple="true">
            {% for tag in tags %}
                <option value="{{ tag.id }}" >
                    {{ tag.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Filter</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product.category.name }}</td>
                <td>${{ product.price }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No products found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
